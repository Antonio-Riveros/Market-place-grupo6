{% extends "base.html" %}

{% block content %}
  <h2>Editar Perfil</h2>

  {% if messages %}
    {% for message in messages %}
      <p style="color: green;">{{ message }}</p>
    {% endfor %}
  {% endif %}

  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Guardar cambios</button>
  </form>

  <a href="{% url 'home' %}">Volver al inicio</a>
{% endblock %}
